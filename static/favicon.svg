<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1040"/>
      <stop offset="100%" style="stop-color:#2d1b69"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700"/>
      <stop offset="100%" style="stop-color:#c8960c"/>
    </linearGradient>
  </defs>

  <!-- Shield base -->
  <path d="M32 3 L58 14 L58 36 Q58 52 32 62 Q6 52 6 36 L6 14 Z"
        fill="url(#shieldGrad)" stroke="#ffd700" stroke-width="2"/>

  <!-- Shield inner border -->
  <path d="M32 8 L53 17 L53 36 Q53 49 32 57 Q11 49 11 36 L11 17 Z"
        fill="none" stroke="#c8960c" stroke-width="1" opacity="0.5"/>

  <!-- Castle / tower body -->
  <rect x="24" y="30" width="16" height="16" fill="url(#goldGrad)" rx="1"/>

  <!-- Gate arch -->
  <path d="M29 46 L29 38 Q32 34 35 38 L35 46 Z" fill="#1a1040"/>

  <!-- Castle battlements (crenellations) -->
  <rect x="23" y="25" width="4" height="7" fill="url(#goldGrad)" rx="1"/>
  <rect x="30" y="23" width="4" height="9" fill="url(#goldGrad)" rx="1"/>
  <rect x="37" y="25" width="4" height="7" fill="url(#goldGrad)" rx="1"/>

  <!-- Tower left -->
  <rect x="17" y="32" width="9" height="14" fill="url(#goldGrad)" rx="1"/>
  <rect x="16" y="28" width="3" height="6" fill="url(#goldGrad)" rx="1"/>
  <rect x="20" y="26" width="3" height="8" fill="url(#goldGrad)" rx="1"/>
  <rect x="24" y="28" width="3" height="6" fill="url(#goldGrad)" rx="1"/>
  <!-- Tower left window -->
  <rect x="20" y="35" width="3" height="4" fill="#1a1040" rx="1"/>

  <!-- Tower right -->
  <rect x="38" y="32" width="9" height="14" fill="url(#goldGrad)" rx="1"/>
  <rect x="37" y="28" width="3" height="6" fill="url(#goldGrad)" rx="1"/>
  <rect x="41" y="26" width="3" height="8" fill="url(#goldGrad)" rx="1"/>
  <rect x="45" y="28" width="3" height="6" fill="url(#goldGrad)" rx="1"/>
  <!-- Tower right window -->
  <rect x="41" y="35" width="3" height="4" fill="#1a1040" rx="1"/>

  <!-- Sword blade vertical -->
  <line x1="32" y1="10" x2="32" y2="25" stroke="#e8e8e8" stroke-width="2" stroke-linecap="round"/>
  <!-- Sword tip -->
  <path d="M32 8 L30 13 L32 11 L34 13 Z" fill="#e8e8e8"/>
  <!-- Crossguard -->
  <line x1="26" y1="18" x2="38" y2="18" stroke="#ffd700" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Pommel -->
  <circle cx="32" cy="25" r="2" fill="#ffd700"/>
</svg>
